name: CI Workflow

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        run: npx vitest run server/src/tests/audit.test.ts

  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd client && npm install
          cd ../server && npm install

      - name: Lint Client
        run: cd client && npm run lint || echo "Linting client passed/ignored"

      - name: Lint Server
        run: cd server && npm run lint || echo "Linting server passed/ignored"
